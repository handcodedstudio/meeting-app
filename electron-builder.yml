appId: studio.handcoded.transcriber
productName: Local Meeting Transcriber

directories:
  output: dist
  buildResources: build

asar: true
asarUnpack:
  # Native bindings (.node) and dylibs must live outside the asar archive.
  - "**/*.node"
  - "**/*.dylib"
  - resources/models/**

files:
  - out/**
  - package.json

extraResources:
  - from: resources/models
    to: models
    filter:
      - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

dmg:
  writeUpdateInfo: false
  artifactName: "${productName}-${version}-${arch}.dmg"

publish: null

compression: maximum
